# Dependabot configuration: https://docs.github.com/en/code-security/dependabot
# Runs weekly on Mondays. PRs are grouped by update type to reduce noise.

version: 2

updates:
  # Runtime + dev dependencies from package.json.
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Europe/Bucharest"
    open-pull-requests-limit: 10
    # Group all minor + patch updates for the same dependency into one PR.
    groups:
      production-minor-and-patch:
        dependency-type: "production"
        update-types:
          - "minor"
          - "patch"
      development-minor-and-patch:
        dependency-type: "development"
        update-types:
          - "minor"
          - "patch"
    # Surface major version bumps individually so they get human review.
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]
    commit-message:
      prefix: "deps"
      include: "scope"
    labels:
      - "dependencies"
      - "npm"
    # Don't auto-merge anything — leave merge decisions to maintainers.
    # (Set `automerged-by: dependabot` PRs on by removing this section if desired.)
    rebase-strategy: "auto"

  # GitHub Actions: bump `actions/checkout`, `actions/setup-node`, etc.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Europe/Bucharest"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "ci"
    labels:
      - "dependencies"
      - "github-actions"
    rebase-strategy: "auto"
